services:
  db:
    image: postgres:17-alpine
    container_name: drivee-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drivee}
      POSTGRES_USER: ${POSTGRES_USER:-drivee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drivee} -d ${POSTGRES_DB:-drivee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: drivee-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: drivee-ollama
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: drivee-ollama-pull
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "echo Pulling model $${OLLAMA_MODEL:-qwen3:4b}...
      && ollama pull $${OLLAMA_MODEL:-qwen3:4b}
      && echo Model $${OLLAMA_MODEL:-qwen3:4b} is ready"

  backend:
    container_name: drivee-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  # Потом можно добавить frontend так:
  # frontend:
  #   build:
  #     context: ./frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  ollama_data:
